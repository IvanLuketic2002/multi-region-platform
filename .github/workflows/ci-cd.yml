name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: Pokretanje testova
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout koda
        uses: actions/checkout@v4

      - name: Podešavanje Python okruženja
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalacija zavisnosti
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pokretanje testova sa Pytest-om
        run: |
          cd backend
          pytest

  # JOB 2: Build i Push Docker slike (samo nakon uspešnih testova na main grani)
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout koda
        uses: actions/checkout@v4

      - name: Prijava na DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Podešavanje Docker Buildx-a
        uses: docker/setup-buildx-action@v3

      - name: Izgradnja i slanje slike na DockerHub
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # Zameni 'tvoj-dockerhub-username' sa svojim stvarnim korisničkim imenom ili ostavi ovako ako ćeš koristiti tajnu
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/multi-region-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/multi-region-api:${{ github.sha }}
