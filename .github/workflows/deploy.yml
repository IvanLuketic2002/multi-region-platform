name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Backend Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/multi-region-backend:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/multi-region-backend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    strategy:
      # Matrica omogućava da se isti koraci izvrše za više različitih vrednosti (IP adresa) paralelno!
      matrix:
        host: [ "${{ secrets.SSH_HOST }}", "${{ secrets.SSH_HOST_SECONDARY }}" ]
    steps:
    - name: Deploy to AWS EC2 via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ matrix.host }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          # set -e prekida skriptu na prvoj grešci
          set -e
          
          echo "Povezan na AWS server: ${{ matrix.host }}. Proveravam Docker..."
          
          # Čekamo dinamički dok Docker servis ne postane aktivan (maksimalno 60 sekundi)
          for i in {1..12}; do
            if sudo systemctl is-active --quiet docker; then
              echo "Docker je spreman!"
              break
            fi
            echo "Čekam da se Docker instalira i pokrene... ($((i*5))s)"
            sleep 5
          done

          # Zaustavi i obriši stari kontejner ako postoji (ovde koristimo || true jer kontejner možda ne postoji na novom serveru)
          sudo docker stop backend-app || true
          sudo docker rm backend-app || true
          
          # Povuci najnoviju sliku
          sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/multi-region-backend:latest
          
          # Pokreni novi kontejner
          sudo docker run -d \
            --name backend-app \
            -p 8000:8000 \
            --restart always \
            ${{ secrets.DOCKERHUB_USERNAME }}/multi-region-backend:latest
          
          echo "Deploy na ${{ matrix.host }} je uspešno završen!"
